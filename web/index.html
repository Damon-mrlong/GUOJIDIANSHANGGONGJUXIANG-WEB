<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="国际电商工具箱 - 供应链效能中台" />
  <title>国际电商工具箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>

<body>
  <div id="app">
    <!-- 加载屏幕 -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">📦</div>
        <h1 class="loading-title">国际电商工具箱</h1>
        <p class="loading-subtitle">正在初始化 Python 运行时...</p>
        <div class="loading-bar-container">
          <div class="loading-bar" id="loading-bar"></div>
        </div>
        <p class="loading-status" id="loading-status">准备中...</p>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main-app" class="main-app hidden">
      <!-- 统一顶栏 -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="topbar-logo">📦</span>
          <h1 class="topbar-title">国际电商工具箱</h1>
        </div>
        <div class="topbar-module" id="topbar-module"></div>
      </header>

      <!-- 下方主体：侧边栏 + 内容区 -->
      <div class="app-body">
        <!-- 侧边栏 -->
        <aside class="sidebar">
          <nav class="sidebar-nav" id="sidebar-nav"></nav>
          <div class="sidebar-footer">
            <div class="engine-status">
              <span class="status-dot"></span>
              <span>引擎就绪</span>
            </div>
          </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
          <div class="content-area" id="content-area"></div>

          <!-- 日志控制台 -->
          <div class="log-console" id="log-console">
            <div class="log-header" id="log-header">
              <span class="log-title">系统运行日志</span>
              <div style="flex:1;"></div>
              <span class="status-dot" style="width:10px;height:10px;"></span>
              <span style="font-size:0.75rem;color:#4caf50;">运行正常</span>
              <div class="log-actions">
                <button class="log-btn" id="log-clear-btn" title="清除">🗑️</button>
                <button class="log-btn" id="log-toggle-btn" title="折叠">▼</button>
              </div>
            </div>
            <div class="log-body" id="log-body">
              <div class="log-entries" id="log-entries"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="app.js?v=7"></script>
</body>

</html>
